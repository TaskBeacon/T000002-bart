task_plot_spec:
  spec_version: '0.2'
  meta:
    task_name: Balloon Analogue Risk Task (BART)
    mode: existing
    task_id: ''
  figure:
    output:
      filename: task_flow.png
      dpi: 300
      width_in: 16.0
      background: white
    layout:
      max_conditions: 4
      screens_per_timeline: 6
      screen_overlap_ratio: 0.1
      screen_slope: 0.08
      screen_slope_deg: 25.0
      timeline_gap: 0.18
      screen_aspect_ratio: 1.4545454545454546
      left_margin: 0.2
      right_margin: 0.03
      top_margin: 0.03
      bottom_margin: 0.05
      condition_label_gap: 0.014
      phase_label_pad: 0.01
      duration_label_gap: 0.006
      timeline_arrow_gap: 0.01
      timeline_arrow_screen_clearance: 0.007
      timeline_arrow_text_clearance: 0.01
      timeline_arrow_extra_per_screen: 0.015
      timeline_arrow_min_y: 0.02
      timeline_arrow_max_y: 0.96
  timelines:
  - condition: blue
    display_condition_label: Blue
    phases:
    - phase_name: pre pump fixation
      display_phase_label: Fixation
      duration_ms:
        fixed: 800
      response_window_ms: null
      display_timing_label: 800 ms
      stim_ids:
      - fixation
      stimulus_example:
        summary: +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: +
          color: white
          pos: null
          height: null
      notes: ''
    - phase_name: pump decision
      display_phase_label: Pump Decision
      duration_ms: null
      response_window_ms: null
      display_timing_label: ''
      stim_ids:
      - blue_balloon
      stimulus_example:
        summary: blue_balloon
        modality: visual
        draw_hint: image
        render_items:
        - kind: image_ref
          path: E:\Taskbeacon\T000002-bart\assets\blue_balloon.png
          label: blue_balloon
      notes: ''
    - phase_name: pop outcome
      display_phase_label: Pop Outcome
      duration_ms:
        fixed: 1000
      response_window_ms: null
      display_timing_label: 1000 ms
      stim_ids:
      - blue_pop
      - pop_sound
      stimulus_example:
        summary: blue_pop + [audio:pop_sound]
        modality: mixed
        draw_hint: annotation
        render_items:
        - kind: image_ref
          path: E:\Taskbeacon\T000002-bart\assets\blue_pop.png
          label: blue_pop
        - kind: annotation
          text: 'Audio: pop_sound'
      notes: unparsed_condition_test
    - phase_name: trial feedback
      display_phase_label: Feedback
      duration_ms:
        fixed: 1000
      response_window_ms: null
      display_timing_label: 1000 ms
      stim_ids:
      - lose_feedback
      stimulus_example:
        summary: 获得：…分
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: 获得：…分
          color: red
          pos: null
          height: null
      notes: ''
    condition_variants:
    - yellow
    - orange
    display_condition_note: 'Also: Yellow, Orange'
  legend: []
